<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard PRO</title>
    <link rel="stylesheet" href="styles.css">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- MAPA (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<header>
    <h2><i class="fas fa-chart-line"></i> Dashboard APIs</h2>
</header>

<div class="container">

    <!-- GEOLOCALIZACIÓN -->
    <div class="card">
        <h3><i class="fas fa-map-marker-alt"></i> Geolocalización</h3>
        <button onclick="obtenerUbicacion()">Obtener ubicación</button>
        <p id="ubicacion"></p>
        <div id="mapa" style="height:200px; border-radius:10px;"></div>
    </div>

    <!-- REDES -->
    <div class="card">
    <h3><i class="fas fa-users"></i> Noticias (tipo Facebook)</h3>

    <select id="categoria" onchange="cargarPosts()">
        <option value="space">Espacio</option>
        <option value="tech">Tecnología</option>
    </select>

    <button onclick="cargarPosts()">Actualizar</button>

    <div id="loaderPosts" class="loader hidden"></div>
    <div id="posts"></div>
</div>

    <!-- E-COMMERCE -->
    <div class="card">
    <h3><i class="fas fa-shopping-cart"></i> E-commerce</h3>

    <input type="text" id="producto" placeholder="Buscar producto">
    <button onclick="buscarProducto()">Buscar</button>

    <div id="loaderProductos" class="loader hidden"></div>
    <div id="productos"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
